name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Backend: Lint + Test ────────────────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Unit tests
        run: npm test
        working-directory: backend

  # ── Frontend: Lint + Build ─────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── Docker Build + Push (main branch only) ─────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/recycling-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/recycling-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/recycling-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/recycling-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update k8s manifests so ArgoCD picks up the new image
      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|boqnbabanin/recycling-backend:.*|boqnbabanin/recycling-backend:${{ github.sha }}|g" \
            k8s/base/backend/deployment.yaml
          sed -i "s|boqnbabanin/recycling-frontend:.*|boqnbabanin/recycling-frontend:${{ github.sha }}|g" \
            k8s/base/frontend/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/backend/deployment.yaml k8s/base/frontend/deployment.yaml

          # Only commit if there are actual changes
          git diff --staged --quiet || \
            git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
